name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
            aether_asset: aether-macos-arm64.tar.gz
          - arch: x86_64
            aether_asset: aether-macos-x86_64.tar.gz
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Resolve latest Aether core version
        id: aether
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/CluvexStudio/Aether/releases/latest | jq -r '.tag_name')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Aether core version: $VERSION"

      - name: Download and extract Aether core
        run: |
          VERSION="${{ steps.aether.outputs.version }}"
          curl -sL "https://github.com/CluvexStudio/Aether/releases/download/${VERSION}/${{ matrix.aether_asset }}" -o /tmp/aether.tar.gz
          tar -xzf /tmp/aether.tar.gz -C /tmp
          chmod +x /tmp/aether
          /tmp/aether --version || true

      - name: Build AetherGUI
        working-directory: macOS
        run: |
          BUILD_ARGS=(
            -project AetherGUI.xcodeproj
            -scheme AetherGUI
            -destination 'generic/platform=macOS'
            -configuration Release
            CODE_SIGN_IDENTITY=""
            CODE_SIGNING_REQUIRED=NO
            CODE_SIGNING_ALLOWED=NO
            ENABLE_HARDENED_RUNTIME=NO
          )
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            BUILD_ARGS+=( ARCHS=x86_64 VALID_ARCHS=x86_64 )
          fi
          xcodebuild build "${BUILD_ARGS[@]}"

      - name: Locate built .app bundle
        id: app
        run: |
          APP_PATH=$(find "${{ github.workspace }}/macOS" ~/Library/Developer/Xcode/DerivedData \
            -name "AetherGUI.app" -path "*/Release/*" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find AetherGUI.app"
            find ~/Library/Developer/Xcode/DerivedData -name "AetherGUI.app" 2>/dev/null
            exit 1
          fi
          echo "path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH/Contents/Resources/" || true

      - name: Bundle Aether core into app
        run: |
          APP="${{ steps.app.outputs.path }}"
          cp /tmp/aether "$APP/Contents/Resources/aether"
          chmod +x "$APP/Contents/Resources/aether"
          echo "Aether core bundled:"
          ls -la "$APP/Contents/Resources/aether"

      - name: Create DMG
        run: |
          APP="${{ steps.app.outputs.path }}"
          STAGING=$(mktemp -d)
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "AetherGUI" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            -imagekey zlib-level=9 \
            "AetherGUI-macOS-${{ matrix.arch }}.dmg"
          rm -rf "$STAGING"
          echo "DMG created:"
          ls -lh "AetherGUI-macOS-${{ matrix.arch }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherGUI-macOS-${{ matrix.arch }}
          path: AetherGUI-macOS-${{ matrix.arch }}.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all DMGs
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: AetherGUI-macOS-*

      - name: List release files
        run: find artifacts/ -type f -name "*.dmg" | sort

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "AetherGUI $TAG" \
            --generate-notes \
            artifacts/AetherGUI-macOS-arm64/AetherGUI-macOS-arm64.dmg \
            artifacts/AetherGUI-macOS-x86_64/AetherGUI-macOS-x86_64.dmg
